            status: "todo"
            description: "If there are still easy wins (mild findings that take <5 minutes each), knock them out."
            dependencies: ["p4.d1.t1"]
            files: ["carry_forward.py"]
          - id: "p4.d1.t3"
            title: "Update ROADMAP.md and version to v7.0.0"
            status: "todo"
            description: "Update the roadmap markdown, bump version, document what changed."
            dependencies: ["p4.d1.t2"]
